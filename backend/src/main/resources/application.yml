server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/social_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:hp197027}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pcc2.social.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:pcc2-social-platform-secret-key-2024}
  expiration: ${JWT_EXPIRATION:604800000}

upload:
  path: ./uploads/images/
  
logging:
  level:
    com.pcc2.social: debug
